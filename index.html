<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN MM HUB - 快速导入</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #30363d; width: 90%; max-width: 450px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { margin-top: 0; color: #58a6ff; font-size: 26px; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 14px; }
        .btn { color: white; padding: 16px 20px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 16px; transition: transform 0.1s, background-color 0.2s; border: none; cursor: pointer; display: block; }
        .btn:active { transform: scale(0.97); }
        
        /* 品牌配色 */
        .btn-hiddify { background-color: #9c27b0; } 
        .btn-hiddify:hover { background-color: #ab47bc; }
        
        .btn-happ { background-color: #007bff; } 
        .btn-happ:hover { background-color: #1a88ff; }
        
        .btn-v2box { background-color: #ff9800; } 
        .btn-v2box:hover { background-color: #ffa726; }

        .btn.disabled { background-color: #30363d; color: #6e7681; pointer-events: none; opacity: 0.6; }
        
        .footer-note { margin-top: 25px; font-size: 12px; color: #484f58; border-top: 1px solid #30363d; pt: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>VPN MM HUB</h2>
        <p id="status-text">正在准备您的接入配置...</p>
        
        <div class="btn-group">
            <a href="#" id="btn-hiddify" class="btn btn-hiddify disabled">Open with Hiddify</a>
            <a href="#" id="btn-happ" class="btn btn-happ disabled">Open with Happ</a>
            <a href="#" id="btn-v2box" class="btn btn-v2box disabled">Open with V2Box</a>
        </div>

        <div class="footer-note">
            提示：点击按钮将自动唤起 App 并保留节点备注
        </div>
    </div>

    <script>
        /**
         * 修复 # 符号截断问题的参数获取函数
         */
        function getCompleteKey() {
            const urlObj = new URL(window.location.href);
            // 获取 ?key= 后的基本内容
            let key = urlObj.searchParams.get('key');
            
            if (key) {
                // 关键点：如果 URL 原始字符串中带有 #，手动将其拼回
                // 浏览器会将第一个 # 之后的内容放入 location.hash
                if (window.location.hash) {
                    key += window.location.hash;
                }
                return key;
            }
            return null;
        }

        const fullKey = getCompleteKey();
        const statusText = document.getElementById('status-text');
        
        const btns = {
            hiddify: document.getElementById('btn-hiddify'),
            happ: document.getElementById('btn-happ'),
            v2box: document.getElementById('btn-v2box')
        };

        if (fullKey) {
            statusText.innerText = "识别成功！请选择客户端导入：";
            
            // 对包含 # 备注的完整链接进行编码
            const encodedKey = encodeURIComponent(fullKey);

            // 配置各客户端跳转协议
            btns.hiddify.href = `hiddify://install-config?url=${encodedKey}`;
            btns.happ.href = `happ://install-config?url=${encodedKey}`;
            btns.v2box.href = `v2box://install-config?url=${encodedKey}`;

            // 激活所有按钮
            Object.values(btns).forEach(btn => btn.classList.remove('disabled'));
        } else {
            statusText.innerHTML = "<span style='color:#f85149;'>错误：未检测到密钥参数</span>";
            Object.values(btns).forEach(btn => btn.innerText = "不可用");
        }
    </script>
</body>
</html>
